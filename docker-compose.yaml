services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - default

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    networks:
      - default

  backend:
    build: ./backend
    expose:
      - "8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    privileged: true
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - OLLAMA_MODEL=llama3
      - OLLAMA_MEDICAL_MODEL=medgemma:4b
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    networks:
      - default

  ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: "ollama pull llama3 && ollama pull medgemma:4b"
    volumes:
      - ollama:/root/.ollama
    networks:
      - default

volumes:
  ollama:

networks:
  default:
    driver: bridge
