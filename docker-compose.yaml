services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - default

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    networks:
      - default

  backend:
    build: ./backend
    expose:
      - "8000"
    depends_on:
      - ollama
    privileged: true
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    networks:
      - default

  ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - default

volumes:
  ollama:

networks:
  default:
    driver: bridge
